font=MonaspiceKrNerdFont:size=10
underline-offset=1

[key-bindings]
unicode-input=Control+Shift+e
scrollback-up-half-page=Control+Shift+u
scrollback-down-half-page=Control+Shift+d
pipe-scrollback=[sh -c helix]Control+Shift+h

[search-bindings]
find-prev=Control+p
find-next=Control+n
delete-prev=Control+h BackSpace
delete-next=Control+l Delete

[colors-dark]
foreground=cccccc
background=1e1e1e
regular0=000000
regular1=cd3131
regular2=0dbc79
regular3=e5e510
regular4=2472c8
regular5=bc3fbc
regular6=11a8cd
regular7=e5e5e5
bright0=666666
bright1=f14c4c
bright2=23d18b
bright3=f5f543
bright4=3b8eea
bright5=d670d6
bright6=29b8db
bright7=e5e5e5
selection-foreground=e0e0e0
selection-background=3a3d41
cursor=000000 ffffff
